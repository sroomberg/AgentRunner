# vllmd configuration
# Copy to vllmd.yaml in your project directory, or to ~/.config/vllmd/config.yml globally.
# Local config takes precedence over global.

sessions:
  store: local   # "local" (filesystem) or "s3" (AWS S3)

  local:
    sessions_dir: ~/.vllmd/sessions

  # s3:
  #   bucket: my-sessions-bucket
  #   prefix: vllmd/sessions/   # key prefix within the bucket
  #   region: us-east-1

vectordb:
  backend: local   # "local" (ChromaDB), "aws" (Amazon OpenSearch Service), or "s3" (ChromaDB synced to S3)

  local:
    db_path: ./vectordb

  # aws:
  #   endpoint: my-domain.us-east-1.es.amazonaws.com   # OpenSearch domain hostname
  #   region: us-east-1
  #   index_prefix: vllmd
  #   embedding_dim: 1536   # must match your embedding model's output dimension
  #   service: es           # use "aoss" for OpenSearch Serverless

  # s3:
  #   bucket: my-vectordb-bucket
  #   prefix: vllmd/vectordb/    # key prefix for the ChromaDB archive
  #   region: us-east-1
  #   local_cache: /tmp/vllmd/vectordb   # optional; defaults to a temp dir

# Container runtime — set to "podman" for rootless Podman environments
# Overridden by the VLLMD_RUNTIME env var or --runtime CLI flag.
# container_runtime: docker

# Cluster orchestration (v2.0+)
# Run `vllmd orchestrator start` on the control node and `vllmd agent start` on each GPU node.

orchestrator:
  host: 0.0.0.0
  port: 7860
  api_key: ""   # Bearer token required by agents; empty = no auth

agent:
  host: 0.0.0.0
  port: 7861

nodes:
  - name: local
    host: localhost
    agent_port: 7861
    gpus: [0, 1]   # GPU device IDs available on this node
  # - name: gpu-node-2
  #   host: 192.168.1.11
  #   agent_port: 7861
  #   gpus: [0]

models:
  - name: llama3-8b
    model_path: meta-llama/Meta-Llama-3-8B-Instruct
    dtype: bfloat16
    max_model_len: 8192
    nodes: [local]
    port: 8001
    gpu_count: 1
    gpu_memory_utilization: 0.9
  # - name: llama3-70b
  #   model_path: meta-llama/Meta-Llama-3-70B-Instruct
  #   nodes: [local]
  #   port: 8002
  #   gpu_count: 2
  #   dtype: bfloat16
